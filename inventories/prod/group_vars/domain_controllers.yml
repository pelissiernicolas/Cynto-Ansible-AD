ad_ous:
  - name: "Serveurs"
    path: "DC=cynto,DC=tech"

  - name: "Utilisateurs"
    path: "DC=cynto,DC=tech"

  - name: "Groupes"
    path: "DC=cynto,DC=tech"

  - name: "Admins"
    path: "OU=Utilisateurs,DC=cynto,DC=tech"

  - name: "Comptes de service"
    path: "OU=Utilisateurs,DC=cynto,DC=tech"

ad_groups:
  - name: "GG_Admins_Infra"
    scope: "global"
    category: "security"
    path: "OU=Groupes,DC=cynto,DC=tech"

  - name: "GG_Utilisateurs_Standard"
    scope: "global"
    category: "security"
